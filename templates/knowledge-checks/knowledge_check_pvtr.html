<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Проверка знаний: ПВТР</title>
  <style>
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #f5f7fa; color: #1f2933; line-height: 1.5; }
    main { max-width: 860px; margin: 0 auto; padding: 24px 14px 40px; }
    header, form, .result { background: #fff; border: 1px solid #d9dee7; border-radius: 8px; padding: 18px; box-shadow: 0 8px 20px rgba(22, 34, 51, .08); }
    header { margin-bottom: 14px; border-top: 6px solid #146c94; }
    h1 { margin: 0 0 8px; font-size: 28px; letter-spacing: 0; }
    h2 { font-size: 18px; margin: 18px 0 8px; letter-spacing: 0; }
    label { display: block; padding: 6px 0; }
    input { margin-right: 8px; }
    button { margin-top: 16px; min-height: 40px; border: 0; border-radius: 6px; padding: 8px 14px; background: #146c94; color: #fff; font: inherit; cursor: pointer; }
    .secondary { background: #fff; color: #146c94; border: 1px solid #146c94; }
    .result { margin-top: 14px; }
    .muted { color: #5d6774; }
    .pass { color: #1f7a4d; font-weight: 700; }
    .warn { color: #9a5b00; font-weight: 700; }
    @media print { button { display: none; } body { background: #fff; } header, form, .result { box-shadow: none; } }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Проверка знаний: ПВТР</h1>
      <p class="muted">Мини-проверка после ознакомления. Это demo/template, не юридическая аттестация.</p>
    </header>
    <form id="quiz">
      <h2>1. Что сделать, если сотрудник не может выйти вовремя?</h2>
      <label><input type="radio" name="q1"> Сообщить после возвращения на работу</label>
      <label><input type="radio" name="q1" data-correct="true"> Уведомить руководителя и HR по установленному каналу</label>
      <label><input type="radio" name="q1"> Передать сообщение через коллегу без фиксации</label>

      <h2>2. Что делать с изменением графика?</h2>
      <label><input type="radio" name="q2"> Менять самостоятельно, если задачи выполнены</label>
      <label><input type="radio" name="q2" data-correct="true"> Согласовать заранее по локальному порядку</label>
      <label><input type="radio" name="q2"> Не сообщать, если изменение меньше часа</label>

      <h2>3. Где фиксируется ознакомление с ПВТР?</h2>
      <label><input type="radio" name="q3"> Только в устной беседе</label>
      <label><input type="radio" name="q3"> В личном мессенджере</label>
      <label><input type="radio" name="q3" data-correct="true"> В листе ознакомления, ЭДО или HR-системе</label>

      <button type="button" id="check">Проверить</button>
      <button type="button" class="secondary" onclick="window.print()">Печать</button>
    </form>
    <div class="result" id="result" aria-live="polite">Ответьте на 3 вопроса. Достаточно 2 правильных ответов из 3.</div>
  </main>
  <script>
    document.querySelector('#check').addEventListener('click', () => {
      const total = 3;
      const correct = [...document.querySelectorAll('input[data-correct="true"]')].filter(input => input.checked).length;
      const result = document.querySelector('#result');
      result.innerHTML = correct >= 2
        ? `<span class="pass">Зачтено: ${correct}/${total}</span>. Можно передать результат ответственному.`
        : `<span class="warn">Нужно повторить: ${correct}/${total}</span>. Разберите правила с HR или руководителем.`;
    });
  </script>
</body>
</html>
